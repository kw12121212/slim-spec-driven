schema: spec-driven
context: |
  auto-spec-driven is a lightweight spec-driven development framework.
  It provides 21 agent skills (init, brainstorm, propose, modify, spec-edit,
  sync-specs, resync-code-mapping, maintenance, apply, verify, review, archive, cancel, auto, simple-task,
  ship, roadmap-plan, roadmap-milestone, roadmap-recommend, roadmap-propose, roadmap-sync) and thin TypeScript
  scaffolding scripts for filesystem operations.
  Skills are markdown files (skills/*/SKILL.md) following the Agent Skills standard.
  Scripts are in scripts/*.ts, compiled to dist/scripts/*.js via tsc.
  install.sh copies skills into ~/.auto-spec-driven/skills/ and symlinks them into
  supported CLI directories such as ~/.claude/skills/, ~/.config/opencode/skills/,
  ~/.trae/skills/, and ~/.agents/skills/. The CLI now also supports a manual
  maintenance execution command alongside the core workflow.
  install.sh supports --cli, --project, --uninstall, and --migrate flags.
rules:
  specs:
    - Requirements specify observable behavior, not implementation details
  tasks:
    - Tasks should be independently completable
