schema: spec-driven
context: |
  slim-spec-driven is a lightweight spec-driven development framework.
  It provides 5 Claude skills (propose, modify, apply, verify, archive) and
  thin TypeScript scaffolding scripts for filesystem operations.
  Skills are markdown files (skills/*/SKILL.md) following the Agent Skills standard.
  Scripts are in scripts/*.ts, compiled to dist/scripts/*.js via tsc.
  install.sh symlinks skills to ~/.claude/skills/ (Claude Code + OpenCode) or
  ~/.config/opencode/skills/ (OpenCode only). Supports --cli, --project, --uninstall flags.
rules:
  specs:
    - Requirements specify observable behavior, not implementation details
  tasks:
    - Tasks should be independently completable
